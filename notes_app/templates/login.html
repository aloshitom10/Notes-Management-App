<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-panel auth-copy">
            <p class="eyebrow">Personal notes</p>
            <h1>Organize your thoughts with clarity.</h1>
            <p>Sign in to search, sort, and update every note from one calm workspace.</p>
        </section>

        <section class="auth-panel auth-card">
            <div class="auth-heading">
                <h2>Welcome back</h2>
                <p>Log in to continue to your dashboard.</p>
            </div>

            <form class="card-form compact-form" method="POST">
                {% csrf_token %}
                <div class="form-field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button class="button button-full" type="submit">Login</button>
            </form>

            <p class="auth-switch">Do not have an account? <a href="{% url 'register' %}">Register here</a></p>
        </section>
    </main>
</body>

</html>
