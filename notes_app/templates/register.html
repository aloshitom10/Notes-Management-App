<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-panel auth-copy">
            <p class="eyebrow">Start organized</p>
            <h1>Create a workspace for your notes.</h1>
            <p>Keep study, work, personal, and important notes in one polished dashboard.</p>
        </section>

        <section class="auth-panel auth-card">
            <div class="auth-heading">
                <h2>Create account</h2>
                <p>Register to begin saving your notes.</p>
            </div>

            <form class="card-form compact-form" method="POST">
                {% csrf_token %}
                <div class="form-field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>

                <div class="form-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>

                <button class="button button-full" type="submit">Register</button>
            </form>

            <p class="auth-switch">Already have an account? <a href="{% url 'home' %}">Login here</a></p>
        </section>
    </main>
</body>

</html>
